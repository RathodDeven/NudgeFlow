version: "3.9"
services:
  # redis and n8n are kept for future reference but not used in the current MVP phase.
  # To run them, uncomment the services below and use 'docker compose up'.

  redis:
    image: redis:7-alpine
    container_name: nudgeflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  n8n:
    image: n8nio/n8n:latest
    container_name: nudgeflow-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_ENCRYPTION_KEY: change_me
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: change_me
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: nudgeflow
      DB_POSTGRESDB_USER: nudgeflow
      DB_POSTGRESDB_PASSWORD: nudgeflow
    # depends_on:
    #   - postgres
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  # postgres_data:
  redis_data:
  n8n_data:
